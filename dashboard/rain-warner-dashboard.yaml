views:
  - sections:
      - cards:
          - type: iframe
            url: /local/rain-warner-map.html?v=11
            aspect_ratio: "4:3"
            layout_options:
              grid_columns: 4
              grid_rows: 6
          - type: heading
            heading: Aktuell
          - color: blue
            entity: binary_sensor.rain_warner_raining
            icon: mdi:weather-rainy
            name: Regnet es?
            type: tile
          - entity: sensor.rain_warner_current_precipitation
            icon: mdi:water
            name: Niederschlag
            type: tile
          - entity: sensor.rain_warner_precipitation_intensity
            icon: mdi:gauge
            name: Intensität
            type: tile
          - color: amber
            entity: sensor.rain_warner_rain_starts_at
            icon: mdi:clock-alert-outline
            name: Regen ab
            type: tile
            visibility:
              - condition: state
                entity: binary_sensor.rain_warner_raining
                state: "off"
          - entity: sensor.rain_warner_rain_ends_at
            icon: mdi:clock-check-outline
            name: Regen endet
            type: tile
            visibility:
              - condition: state
                entity: binary_sensor.rain_warner_raining
                state: "on"
        type: grid
      - cards:
          - type: heading
            heading: Vorhersage
          - entity: sensor.rain_warner_max_precipitation_1h
            icon: mdi:arrow-up-bold
            name: Max 1h
            type: tile
          - entity: sensor.rain_warner_max_precipitation_2h
            icon: mdi:arrow-up-bold-box
            name: Max 2h
            type: tile
          - entity: sensor.rain_warner_total_precipitation_1h
            icon: mdi:cup-water
            name: Gesamt 1h
            type: tile
          - entity: sensor.rain_warner_total_precipitation_2h
            icon: mdi:bucket-outline
            name: Gesamt 2h
            type: tile
          - type: heading
            heading: Verlauf
          - entities:
              - entity: sensor.rain_warner_current_precipitation
                name: mm/h
              - entity: sensor.rain_warner_max_precipitation_1h
                name: Max 1h
            hours_to_show: 24
            type: history-graph
        type: grid
    title: Regenradar
    max_columns: 2
    type: sections
