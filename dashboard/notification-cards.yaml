# Rain Warner — Walldisplay notification cards (reference snippet)
#
# Drop these `conditional` markdown cards into a `vertical-stack` on
# any dashboard view that already has a "notifications" area (e.g. the
# stack next to an analog clock on a wall display). They stay invisible
# until the corresponding alert binary sensor flips on, mirroring the
# pattern HA's other warning notifications follow.
#
# Each card reads its data from the binary sensor's own attributes
# rather than separate sensor entities — that keeps the templates
# defensive (the integration writes the flag and the attributes in the
# same coordinator pass, so they never get out of sync) and makes
# manual state overrides for testing trivial.
#
# All four sensors are exposed by the rain_warner integration:
#
#   binary_sensor.rain_warner_rain_imminent       — rain in <= 30 min
#   binary_sensor.rain_warner_severe_weather      — heavy / violent / hail
#   binary_sensor.rain_warner_winter_weather      — snow / sleet / freezing rain
#   binary_sensor.rain_warner_extended_dry_spell  — >= 7 days no rain

- type: conditional
  conditions:
    - condition: state
      entity: binary_sensor.rain_warner_rain_imminent
      state: "on"
  card:
    type: markdown
    content: >-
      {% set ts = state_attr('binary_sensor.rain_warner_rain_imminent', 'rain_starts_at') %}
      {% set mins = state_attr('binary_sensor.rain_warner_rain_imminent', 'rain_starts_in_minutes') %}
      🟦 🌧️ **Regen ab
      {% if ts %}{{ as_timestamp(ts) | timestamp_custom('%H:%M', true) }}{% else %}gleich{% endif %}**
      {% if mins %}(in {{ mins }} min){% endif %}


      Wäsche, Markisen, Polster reinholen.

- type: conditional
  conditions:
    - condition: state
      entity: binary_sensor.rain_warner_severe_weather
      state: "on"
  card:
    type: markdown
    content: >-
      {% set rate = state_attr('binary_sensor.rain_warner_severe_weather', 'max_precipitation_mm_h') | float(0) %}
      {% set ptype = state_attr('binary_sensor.rain_warner_severe_weather', 'precipitation_type') %}
      🔴 ⛈️ **Starkregen erwartet
      {%- if rate > 0 %} — bis {{ rate }} mm/h{%- endif %}**


      {% if ptype == 'hail_likely' -%}
      Hagel möglich — Auto unterstellen!
      {%- else -%}
      Tür zu, Markisen einholen.
      {%- endif %}

- type: conditional
  conditions:
    - condition: state
      entity: binary_sensor.rain_warner_winter_weather
      state: "on"
  card:
    type: markdown
    content: >-
      {% set t = state_attr('binary_sensor.rain_warner_winter_weather', 'precipitation_type') %}
      {% set temp = state_attr('binary_sensor.rain_warner_winter_weather', 'temperature_c') %}
      {% set label = {'snow': 'Schnee', 'sleet': 'Schneeregen',
                       'freezing_rain': 'Gefrierender Regen'}.get(t, t or 'Winterwetter') %}
      ❄️ **{{ label }} erwartet**


      {% if temp is not none -%}
      Glatteis-Risiko bei {{ temp }} °C.
      {%- else -%}
      Glatteis-Risiko.
      {%- endif %}

- type: conditional
  conditions:
    - condition: state
      entity: binary_sensor.rain_warner_extended_dry_spell
      state: "on"
  card:
    type: markdown
    content: >-
      {% set hrs = state_attr('binary_sensor.rain_warner_extended_dry_spell', 'dry_streak_hours') | float(0) %}
      {% set days = (hrs / 24) | round(0) | int %}
      🟫 🌵 **Letzter Regen vor {{ days }} Tagen**


      Pflanzen gießen?
